spring.application.name=spring-ai-chat-v2

# Optional local overrides (password for Unsloth, etc). Gitignored.
spring.config.import=optional:classpath:application-local.properties

# Ollama Configuration (default: local)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=default
spring.ai.ollama.chat.options.temperature=0.5
spring.ai.ollama.init.timeout=120s
spring.ai.ollama.init.connect-timeout=30s

# LM Studio Configuration (OpenAI-compatible API)
spring.ai.openai.base-url=http://127.0.0.1:1234
spring.ai.openai.api-key=lm-studio
spring.ai.openai.chat.options.model=default
spring.ai.openai.chat.options.temperature=0.7

# MCP Client Configuration (auto-detected — app starts with or without the MCP server)
# McpClientConfig probes the URL on first use; tools are available only when reachable.
# Disable the auto-configuration here — McpClientConfig provides the beans instead.
spring.ai.mcp.client.enabled=false
spring.ai.mcp.client.streamable-http.connections.local.url=http://localhost:8765

# Unsloth Studio Configuration (OpenAI-compatible API behind JWT auth)
# Password is loaded from application-local.properties (gitignored) or UNSLOTH_PASSWORD env var.
unsloth.base-url=http://127.0.0.1:8888
unsloth.username=unsloth
unsloth.password=${UNSLOTH_PASSWORD:}

# H2 Database (file-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/chatdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Allow large form POST bodies (for base64 image data)
server.tomcat.max-http-form-post-size=10MB

# Workspace for AI file tools
workspace.root=./workspace

# Default Ollama context window (num_ctx). Per-conversation override comes from the
# UI input which stores the user's choice in localStorage and sends &numCtx=… on each
# stream call. KV cache size scales linearly with this — a 31B model at 16000 needs
# ~13 GiB of KV cache on top of weights; 8000 is the safe default on a 32 GiB host.
chat.default-num-ctx=8000

# Disable Spring MVC's default async timeout so /chat/{id}/stream is governed solely
# by the SseEmitter's own budget set in ChatController. Long reasoning-model turns
# (prompt eval + generation tail) can exceed any reasonable MVC default.
spring.mvc.async.request-timeout=-1

# Thymeleaf
spring.thymeleaf.cache=false
